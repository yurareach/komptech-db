{% extends "base.html" %}
{% block title %}Новая поставка{% endblock %}
{% block page_title %}➕ Новая поставка{% endblock %}
{% block content %}
<div class="card" style="max-width:480px">
  <form method="post">
    <div class="form-group"><label>Поставщик *</label>
      <select name="supplier_id" required><option value="">— выберите —</option>
        {% for s in suppliers %}<option value="{{ s.supplier_id }}">{{ s.name }}</option>{% endfor %}
      </select></div>
    <div class="form-group"><label>Комментарий</label>
      <textarea name="comment" placeholder="Необязательно..."></textarea></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-success" type="submit">✅ Создать</button>
      <a href="/supplies" class="btn btn-ghost">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
