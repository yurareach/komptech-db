{% extends "base.html" %}
{% block title %}{{ 'Редактировать' if client else 'Новый' }} клиент{% endblock %}
{% block page_title %}{{ '✏️ Редактировать клиента' if client else '➕ Новый клиент' }}{% endblock %}
{% block content %}
<div class="card" style="max-width:580px">
  <form method="post">
    <div class="form-group">
      <label>Тип клиента</label>
      <select name="client_type">
        <option {% if not client or client.client_type=='физлицо' %}selected{% endif %}>физлицо</option>
        <option {% if client and client.client_type=='юрлицо' %}selected{% endif %}>юрлицо</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Фамилия</label>
        <input name="last_name" value="{{ client.last_name if client else '' }}">
      </div>
      <div class="form-group">
        <label>Имя</label>
        <input name="first_name" value="{{ client.first_name if client else '' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Отчество</label>
        <input name="patronymic" value="{{ client.patronymic if client else '' }}">
      </div>
      <div class="form-group">
        <label>Организация (для юрлиц)</label>
        <input name="org_name" value="{{ client.org_name if client else '' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>ИНН</label>
        <input name="inn" value="{{ client.inn if client else '' }}">
      </div>
      <div class="form-group">
        <label>Телефон</label>
        <input name="phone" value="{{ client.phone if client else '' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input name="email" type="email" value="{{ client.email if client else '' }}">
      </div>
      <div class="form-group">
        <label>Скидка (%)</label>
        <input name="discount_pct" type="number" step="0.1" min="0" max="100" value="{{ client.discount_pct if client else 0 }}">
      </div>
    </div>
    <div class="form-group">
      <label>Адрес</label>
      <textarea name="address">{{ client.address if client else '' }}</textarea>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-primary" type="submit">💾 Сохранить</button>
      <a href="/clients" class="btn btn-ghost">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
